[pytest]
addopts = -m "not perf and not smoke"
markers =
    smoke: D219 live-subprocess smoke harness; opt-in (excluded by default addopts; run with -m smoke)
    slow: Chunk 76 uv subprocess integration tests in tests/setup/ (uv sync, lock --check)
    perf: Chunk 61 performance regression suite; excluded from default collection by addopts
    integration: full-stack integration tests (require live services; not run on every PR)
    requires_db_wipe: D472/D485 graph-state fixtures that retain TRUNCATE; D472 guard interlock (Chunk 75a)
    requires_graph_corpus: needs a seeded ArcadeDB graph corpus; opt-in via GRACE_REQUIRE_SERVICES=1 (three-tier test setup, 2026-05-28)
    requires_ollama: needs Ollama at localhost:11434; auto-skipped when unavailable (three-tier test setup)
    requires_arcade: needs ArcadeDB at localhost:2480; auto-skipped when unavailable (three-tier test setup)
    requires_live_server: needs a running uvicorn at localhost:8000; auto-skipped when unavailable (three-tier test setup)
    requires_ocr: needs OCR backend (OcrMac on Darwin, RapidOCR elsewhere); auto-skipped when unavailable (three-tier test setup)
    requires_vision: needs vision-capable LLM (Ollama with qwen2.5-vl or cloud vision provider); auto-skipped when unavailable (three-tier test setup)
    requires_nltk: needs NLTK POS tagger data (averaged_perceptron_tagger_eng + punkt_tab); auto-skipped when unavailable (three-tier test setup)
    mcp_stdio: MCP stdio roundtrip smoke (spawns the MCP server subprocess; no upstream dependency)
